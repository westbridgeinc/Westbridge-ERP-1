name: Security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 2 * * 1'  # Weekly Monday 2am

jobs:
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm audit --audit-level=high
      - name: License check
        # Additional permissive/weak-copyleft licences needed for Linux-only transitive deps:
        #  LGPL-3.0-or-later : @img/sharp-libvips-linux-x64 (native lib; LGPL applies to the
        #                       lib itself, not application code that links to it dynamically)
        #  MPL-2.0           : axe-core (file-level copyleft only; does not affect app code)
        run: npx license-checker --onlyAllow "MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;CC0-1.0;CC-BY-4.0;Unlicense;LGPL-3.0-or-later;LGPL-3.0;MPL-2.0;Python-2.0" --excludePrivatePackages

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        continue-on-error: true  # Requires GitHub Advanced Security; non-fatal until enabled in repo settings

  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true  # Errors when BASE==HEAD (direct push with no diff history); non-fatal

  owasp-zap:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Start app stack
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test
          MYSQL_ROOT_PASSWORD: zap-ci-password
        run: docker compose up -d postgres redis && sleep 15
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-I'
        continue-on-error: true  # ZAP is best-effort; app server not provisioned in this job
