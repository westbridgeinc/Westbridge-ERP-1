name: Security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 2 * * 1'  # Weekly Monday 2am

jobs:
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: "npm"
      - run: npm ci
      - run: npm audit --audit-level=high
      - name: License check
        run: |
          npx --yes license-checker --excludePrivatePackages --json 2>/dev/null > /tmp/licenses.json
          python3 - <<'PYEOF'
          import sys, json
          with open('/tmp/licenses.json') as f:
              data = json.load(f)
          blocked = {'GPL-2.0','GPL-2.0-only','GPL-2.0-or-later','GPL-3.0','GPL-3.0-only','GPL-3.0-or-later','AGPL-3.0','AGPL-3.0-only','AGPL-3.0-or-later'}
          violations = []
          for pkg, info in data.items():
              lic = str(info.get('licenses',''))
              parts = [l.strip().strip('()') for l in lic.replace(' OR ',';').replace(' AND ',';').split(';')]
              if any(p in blocked for p in parts):
                  violations.append(f'BLOCKED: {pkg} ({lic})')
          if violations:
              print('Found packages with prohibited licences (strong copyleft):')
              print('\n'.join(violations))
              sys.exit(1)
          print('License check passed - no strong copyleft dependencies found.')
          PYEOF

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
