name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: deploy-frontend
  cancel-in-progress: false  # Don't cancel in-progress deploys

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    environment: production
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      # ── Railway deployment ──────────────────────────────────────────────────
      - name: Install Railway CLI
        if: env.RAILWAY_TOKEN != ''
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: env.RAILWAY_TOKEN != ''
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Railway — skip notice
        if: env.RAILWAY_TOKEN == '' && env.FLY_API_TOKEN == ''
        run: echo "::notice::Neither RAILWAY_TOKEN nor FLY_API_TOKEN configured — deployment skipped"

      # ── Fly.io deployment (fallback) ────────────────────────────────────────
      - name: Setup Fly.io CLI
        if: env.FLY_API_TOKEN != '' && env.RAILWAY_TOKEN == ''
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        if: env.FLY_API_TOKEN != '' && env.RAILWAY_TOKEN == ''
        run: flyctl deploy --remote-only

      - name: Verify deployment
        if: env.RAILWAY_TOKEN != '' || env.FLY_API_TOKEN != ''
        run: |
          sleep 15
          DEPLOY_URL="${{ vars.DEPLOY_URL || 'https://westbridge-frontend.fly.dev' }}"
          STATUS=$(curl -so /dev/null -w "%{http_code}" "$DEPLOY_URL" || echo "000")
          echo "Frontend HTTP status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "307" ]; then
            echo "::warning::Frontend returned HTTP $STATUS"
          fi
