name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    if: vars.E2E_BACKEND_URL != ''
    env:
      NEXT_PUBLIC_API_URL: ${{ vars.E2E_BACKEND_URL }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      BACKEND_URL: ${{ vars.E2E_BACKEND_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.E2E_BACKEND_URL }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Start server
        run: |
          npm start &
          sleep 5
      - name: Run E2E tests
        run: npx playwright test

  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [e2e]
    if: always() && (needs.e2e.result == 'success' || needs.e2e.result == 'skipped')
    environment: production
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Install Railway CLI
        if: env.RAILWAY_TOKEN != ''
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: env.RAILWAY_TOKEN != ''
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Railway — skip notice
        if: env.RAILWAY_TOKEN == '' && env.FLY_API_TOKEN == ''
        run: echo "::notice::Neither RAILWAY_TOKEN nor FLY_API_TOKEN configured — deployment skipped"

      - name: Setup Fly.io CLI
        if: env.FLY_API_TOKEN != '' && env.RAILWAY_TOKEN == ''
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        if: env.FLY_API_TOKEN != '' && env.RAILWAY_TOKEN == ''
        run: flyctl deploy --remote-only

      - name: Verify deployment
        if: env.RAILWAY_TOKEN != '' || env.FLY_API_TOKEN != ''
        run: |
          sleep 15
          DEPLOY_URL="${{ vars.DEPLOY_URL || 'https://westbridge-frontend.fly.dev' }}"
          STATUS=$(curl -so /dev/null -w "%{http_code}" "$DEPLOY_URL" || echo "000")
          echo "Frontend HTTP status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "307" ]; then
            echo "::warning::Frontend returned HTTP $STATUS"
          fi

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: staging
    env:
      RAILWAY_TOKEN: ${{ secrets.STAGING_RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.STAGING_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ vars.STAGING_APP_URL }}
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to staging
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.STAGING_RAILWAY_TOKEN }}
      - name: Verify staging deployment
        run: |
          sleep 15
          STAGING_URL="${{ vars.STAGING_APP_URL }}"
          STATUS=$(curl -so /dev/null -w "%{http_code}" "$STAGING_URL" || echo "000")
          echo "Staging HTTP status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "307" ]; then
            echo "::warning::Staging returned HTTP $STATUS"
          fi
