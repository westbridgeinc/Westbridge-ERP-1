name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_API_URL: http://localhost:4000
  NEXT_PUBLIC_APP_URL: http://localhost:3000

# E2E tests run as a separate workflow so they don't block the main CI pipeline.
# They require a live backend which is not available in CI by default.
# This workflow is informational — failures here do not block merges.

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run Playwright tests
        run: |
          npx playwright test || echo "::warning::E2E tests failed — requires a live backend to pass"
        env:
          CI: true
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
