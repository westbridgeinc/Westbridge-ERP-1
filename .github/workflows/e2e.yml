name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Only run when a staging backend URL is configured
    if: vars.E2E_BACKEND_URL != ''
    env:
      NEXT_PUBLIC_API_URL: ${{ vars.E2E_BACKEND_URL }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      BACKEND_URL: ${{ vars.E2E_BACKEND_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Start Next.js server
        run: |
          npm start &
          sleep 5
      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Gate job that always succeeds when E2E is skipped (no backend configured)
  # but fails when E2E actually runs and fails
  e2e-gate:
    name: E2E Gate
    runs-on: ubuntu-latest
    needs: [e2e]
    if: always()
    steps:
      - name: Check E2E result
        run: |
          if [ "${{ needs.e2e.result }}" = "failure" ]; then
            echo "::error::E2E tests failed — blocking deployment"
            exit 1
          fi
          echo "E2E gate passed (result: ${{ needs.e2e.result }})"
